substitutions:
  _REGION: us-central1
  _SERVICE: jobtracker
  _MIGRATE_JOB: jobtracker-migrate
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/jobtracker:$COMMIT_SHA

steps:
  - id: Build image
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "$_IMAGE", "."]

  - id: Push image
    name: gcr.io/cloud-builders/docker
    args: ["push", "$_IMAGE"]

  - id: Deploy Cloud Run service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - $_IMAGE
      - --region
      - $_REGION
      - --allow-unauthenticated

  - id: Update migrate job image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - $_MIGRATE_JOB
      - --image
      - $_IMAGE
      - --region
      - $_REGION

  - id: Run migrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - $_MIGRATE_JOB
      - --region
      - $_REGION
      - --wait

images:
  - "$_IMAGE"
