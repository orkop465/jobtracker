substitutions:
  _REGION: us-central1
  _SERVICE: jobtracker
  _MIGRATE_JOB: jobtracker-migrate
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/jobtracker:$COMMIT_SHA

steps:
  - id: Install deps
    name: node:20-slim
    # `prisma generate` loads `prisma.config.ts`, which calls
    # `env("DATABASE_URL")` at startup. Without a value, Prisma 7
    # aborts with PrismaConfigEnvError. We don't connect to the DB
    # here — `generate` only emits the typed client into
    # node_modules — so a placeholder URL is sufficient and matches
    # what the Dockerfile builder stage already does.
    env:
      - 'DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder'
    entrypoint: bash
    args:
      - -c
      - |
        npm ci --ignore-scripts
        npx prisma generate

  - id: Lint
    name: node:20-slim
    entrypoint: npm
    args: ["run", "lint"]
    waitFor: ["Install deps"]

  - id: Test
    name: node:20-slim
    entrypoint: npm
    args: ["test"]
    waitFor: ["Install deps"]

  - id: Build image
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "$_IMAGE", "."]
    waitFor: ["Lint", "Test"]

  - id: Push image
    name: gcr.io/cloud-builders/docker
    args: ["push", "$_IMAGE"]

  # Deploy a new revision but DO NOT shift traffic yet. If migrations fail
  # below, traffic stays on the previous good revision and users see no
  # downtime / no schema mismatch.
  - id: Deploy Cloud Run revision (no traffic)
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - $_IMAGE
      - --region
      - $_REGION
      - --allow-unauthenticated
      - --no-traffic
      - --tag
      - rev-$SHORT_SHA

  - id: Update migrate job image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - $_MIGRATE_JOB
      - --image
      - $_IMAGE
      - --region
      - $_REGION

  - id: Run migrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - $_MIGRATE_JOB
      - --region
      - $_REGION
      - --wait

  # Migrations succeeded — promote the new revision to receive 100% of traffic.
  - id: Promote new revision to 100% traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - $_SERVICE
      - --region
      - $_REGION
      - --to-latest

# NOTE: no top-level `images:` block. The explicit `Push image` step
# above already pushes to Artifact Registry; an `images:` block would
# duplicate that push and adds a substitution surface we don't need.
#
# Options:
# - logging: CLOUD_LOGGING_ONLY — required when the trigger runs as a
#   custom service account (Compute Engine default, in our case).
#   Without this, Cloud Build refuses to start because the legacy
#   default logs bucket is owned by the legacy CB SA. Sends build logs
#   to Cloud Logging instead of a GCS bucket.
# - dynamic_substitutions: true — required so built-in substitutions
#   ($PROJECT_ID, $COMMIT_SHA, $SHORT_SHA) inside user-defined
#   substitutions (here, $_IMAGE) are expanded at runtime instead of
#   being passed through as literal strings.
options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
